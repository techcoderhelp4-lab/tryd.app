# Gradle JVM: balanced memory (was 8G, overkill and causes GC pressure)
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256m -XX:+UseParallelGC

# Build speed
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# AndroidX — Jetifier OFF (project already fully migrated)
android.useAndroidX=true
android.enableJetifier=false

# Suppress Kotlin jvmTarget mismatch warning
kotlin.jvm.target.validation.mode=warning

# Incremental annotation processing
kapt.incremental.apt=true
